name: Send Telegram Messages

on:
  schedule:
    # نشغل كل دقيقة
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Set timezone to Egypt
        run: |
          sudo timedatectl set-timezone Africa/Cairo
          date  # هتطبع الوقت الحالي عشان تتأكدي
          
      - name: Install dependencies
        run: |
          pip install requests pytz  # مهم نضيف pytz
        
      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Africa/Cairo  # مهم جداً!
        run: python main.py
        
      - name: Save state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state [skip ci]" && git push)
